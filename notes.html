                    title: "reading 'I had that same dream again'",
                    body: "alright so its currently 4 am vietnam time/2 pm PST on July 25th, 2023. i am currently on a plane that departed from Taipei, Taiwan and is headed to San Francisco airport. We are roughly 6 hours away and i am currently at 31 percent battery charge. not looking too good. anyways i just finished reading 10 chapters of a manga I downloaded and have been meaning to read since forever.\n\nThe manga is called 'I had that same dream again.' Some backstory to how I came across it is through MyAnimeList! I had just finished reading 3 Days of Happiness (such a good manga) and I was looking at the reccomended/similar manga sections that MAL has for manga and I came across this one. the synopsis looked super interesting and the art looked cute so I added it to my plan to watch, but didn't end up reading it until longer than a year later i guess? i read 3 days of happiness near the end of my junior year and now I'm heading to college... time flies.\n\ncoincidentally this also ties into the manga because that's kind of what it's about! so to give a quick, but also SPOILER FILLED synopsis (also t/w self harm). basically, a 4th grade girl goes with a black cat and she has no friends at school and she is kinda a smartass. anyways she goes with this black cat to her 3 real friends. the first one we meet is a adult women in her 20-30s and she's a prostitute. the next is a old granny who makes her snacks. and the last is a teenage high schooler who cuts herself and writes stories. well big spoilers ALL OF THESE FRIENDS ARE HER. yeah I realized a little early maybe but still in the same chapter it got revealed so I'm glad that I didn't get omega spoiled early. anyways the manga has been really good and I've really enjoyed it. cried lots of tears but I do want to talk about my favorite part.\n\nMy favorite part has to be Minami-san's small yet REALLY influential arc. for those who don't know Minami is the high school girl who cuts her wrists. It's probably because most recently I too was a high school person and I'm still a teenager. I also was lonely, alone, and liked to write. never harmed myself intentionally though, but I have dealt with depression although that's not to say that self-harm is the same thing. anyways it just felt all very relatable and it hit me the hardest. especially the stuff with her parents and ahhh it just hit so hard. such a good arc imo i love Minami she is too cute. I was so sad when she just disappeared but I get it now.\n\nanyways now there's a romance thing which I find out of the blue and out of nowhere but it's fine. i sorta get it. I just needed a break from reading, but I'll get back to it. OH and also I've been listening to Ichika Nito the whole timr and it is perfect reading music. anyways hopefully we get home soon idk hiw much longer I can stand being in this plane seriously. uhh yeah going to finish it now and there was another manga similar to this and 3 days of happiness I think but I didn't download it I don't think. OH also Minami kinda reminded me of my cousin █████. uhhh idk what else I was going to say. I REMEMWVER I was going to write a diary about my time in Vietnam ill try to remember everything ok bye!\n\nah forgot it was only 12 chapters. 2 chapters later and 20 minutes passing and im back. really good manga but im veryyy confused i will search up what just happened when I get home, but i really enjoyed it. ok I should try to get some sleep and wait for my parents to awake so I can charge my phone. hopefully i sleep until the plane lands 🙏goodnight.",

            let recentHistory = [];
            let currentFilter = "all";

            function getFiltered() {
                return currentFilter === "all" ? notes : notes.filter(n => n.tag === currentFilter);
            }

            function setFilter(tag) {
                currentFilter = tag;
                recentHistory = [];

                document.querySelectorAll("#filter-buttons button").forEach(btn => {
                    btn.classList.toggle("active", btn.textContent === tag);
                });

                const filtered = getFiltered();
                const noResults = document.getElementById("no-results");
                const rerollBtn = document.getElementById("reroll-btn");

                if (filtered.length === 0) {
                    noResults.style.display = "block";
                    rerollBtn.style.display = "none";
                    document.getElementById("note-date").textContent = "";
                    document.getElementById("note-title").textContent = "";
                    document.getElementById("note-body").innerHTML = "";
                } else {
                    noResults.style.display = "none";
                    rerollBtn.style.display = "inline";
                    reroll();
                }

                updateCounter();
            }

            function updateCounter() {
                const filtered = getFiltered();
                const total = notes.length;
                const showing = filtered.length;
                document.getElementById("note-counter").textContent =
                    currentFilter === "all"
                        ? total + " notes"
                        : showing + " / " + total + " notes";
            }

            function reroll() {
                const filtered = getFiltered();
                if (filtered.length === 0) return;

                const historySize = Math.min(13, filtered.length - 1);
                let idx;
                do { idx = Math.floor(Math.random() * filtered.length); } while (recentHistory.slice(-historySize).includes(idx));

                recentHistory.push(idx);
                if (recentHistory.length > 13) recentHistory.shift();

                const n = filtered[idx];
                document.getElementById("note-date").textContent = n.date;
                document.getElementById("note-title").textContent = n.title;
                document.getElementById("note-body").innerHTML = n.body.replaceAll("\n", "<br>");
                const img = document.getElementById("note-img");
                if (n.img) {
                    img.src = n.img;
                    img.style.display = "block";
                } else {
                    img.src = "";
                    img.style.display = "none";
                }
                            }

            reroll();
            updateCounter();
        </script>
