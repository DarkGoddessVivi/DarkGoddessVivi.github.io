<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>photos</title>
<style>
#gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
  grid-template-rows: masonry;
  gap: 15px;
  padding: 16px;
}

.photo-wrap {
  margin-bottom: 0; 
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #cf9dbc;
  box-shadow: 4px 4px 0px rgba(82, 8, 78, 0.2);
}

  .photo-wrap img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
    will-change: transform;
  }

  .photo-wrap:hover img {
    transform: scale(1.05);
  }

  .photo-wrap .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 10px;
  }

  .photo-wrap:hover .overlay {
    opacity: 1;
  }

  .overlay span {
    color: white;
    font-size: 13px;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  #lightbox.open {
    display: flex;
  }

  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
  }

  body {
    background-image: url('https://madoka.nekoweb.org/kyubey%20background.png');
    background-repeat: repeat;
    background-size: 160px;
  }

  h1 {
    text-align: center;
    color: #52254f;
    font-family: 'Merriweather', serif;
  }

  #container {
  width: 1100px;
  margin: 0 auto; /* centers it */
  background: #ffdef3;
  padding: 20px;
  border: #52084e solid 1px;
}

  #leftSidebar a {
      font-family: nunito, sans-serif;
      font-weight: bold;
      color: #d835a7;
    }

  #leftSidebar h2 {
  font-family: nunito, sans-serif;
  font-weight: bold;
  color: #ff0095;
  }

  #leftSidebar {
      position: fixed;
      top : 0;
      left: 0;
      width: 150px;
      height: auto;
      overflow-y: auto;
      order: 1;
      background-color: #FAACBF;
      padding: 20px;
      font-size: smaller;
      margin-top: 15px;
      margin-left: 15px;
      border: 2px solid #000000;
  }

  #leftSidebar img {
    width: 150px;
    border: 2px dotted #9900ff;
  }

  #leftSidebar ul {
    color: white;
  }
</style>
</head>

      <h1>miami + cruise 12/2025</h1>

<div id="container">
  <div id="gallery"></div>
</div>

<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const SB_URL = 'https://htpjkvosiymdhacuuywi.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cGprdm9zaXltZGhhY3V1eXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjk2MTIsImV4cCI6MjA5Mzg0NTYxMn0.S-AHCTCJbPS2dXMkh2GL_n7zqVQir53b9OImQieqkbM';

  async function loadPhotos(category) {
    let url = `${SB_URL}/rest/v1/photos?select=*&order=sort_order.asc`;
    if (category) url += `&category=eq.${encodeURIComponent(category)}`;
    const res = await fetch(url, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    return await res.json();
  }

  async function init() {
    const photos = await loadPhotos('Sony Nex-5N > Miami + Cruise');
    const gallery = document.getElementById('gallery');
    photos.forEach(p => {
      const wrap = document.createElement('div');
      wrap.className = 'photo-wrap';

      const img = document.createElement('img');
      img.src = p.cloudinary_url;
      img.alt = p.title;

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<span>${p.title}</span>`;

      wrap.appendChild(img);
      wrap.appendChild(overlay);
      wrap.onclick = () => {
        document.getElementById('lightbox-img').src = p.cloudinary_url;
        document.getElementById('lightbox').classList.add('open');
      };

      gallery.appendChild(wrap);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  });

  init();
</script>
</body>
